name: PR Quality Gates

on:
  pull_request:
    branches: [main]

jobs:
  pr-quality:
    name: PR Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: No debug statements in source
        run: |
          found=0
          if grep -rn "console\.log\|debugger\|import pdb\|pdb\.set_trace\|breakpoint()" \
               --include="*.py" --include="*.js" --include="*.vue" \
               backend/ frontend/src/ 2>/dev/null | grep -v "node_modules" | head -20; then
            echo "::warning::Debug statements found in source code"
            found=1
          fi
          if [ "$found" -eq 0 ]; then
            echo "No debug statements found"
          fi
