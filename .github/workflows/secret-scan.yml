name: Secret Scan

on:
  push:
    branches: [main, new-UI]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Credential Leak Prevention
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan for leaked secrets
        run: |
          echo "Scanning for potential credential leaks..."
          found=0

          # Anthropic API keys
          if grep -rn 'sk-ant-[a-zA-Z0-9_-]\{20,\}' --include="*.py" --include="*.js" --include="*.vue" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" --include="*.txt" --include="*.env*" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | head -5; then
            echo "::error::Anthropic API key found in source"
            found=1
          fi

          # OpenAI API keys
          if grep -rn 'sk-[a-zA-Z0-9]\{40,\}' --include="*.py" --include="*.js" --include="*.vue" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | grep -v 'package-lock' | head -5; then
            echo "::error::Possible OpenAI API key found in source"
            found=1
          fi

          # Google/Gemini API keys
          if grep -rn 'AIza[a-zA-Z0-9_-]\{35\}' --include="*.py" --include="*.js" --include="*.vue" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | head -5; then
            echo "::error::Google API key found in source"
            found=1
          fi

          # GitHub PATs
          if grep -rn 'ghp_[a-zA-Z0-9]\{36\}' --include="*.py" --include="*.js" --include="*.vue" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | head -5; then
            echo "::error::GitHub PAT found in source"
            found=1
          fi

          # AWS keys
          if grep -rn 'AKIA[A-Z0-9]\{16\}' --include="*.py" --include="*.js" --include="*.vue" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | head -5; then
            echo "::error::AWS access key found in source"
            found=1
          fi

          # Private keys
          if grep -rn 'BEGIN.*PRIVATE KEY' --include="*.py" --include="*.js" --include="*.pem" --include="*.key" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | head -5; then
            echo "::error::Private key found in source"
            found=1
          fi

          # Supabase keys (project-specific)
          if grep -rn 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.' --include="*.py" --include="*.js" --include="*.vue" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | grep -v '.env.example' | head -5; then
            echo "::warning::Possible hardcoded JWT/Supabase key found"
            found=1
          fi

          # Generic password patterns
          if grep -rn 'password\s*=\s*["\x27][^"\x27]\{8,\}["\x27]' --include="*.py" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v '.git/' | grep -v test | grep -v example | grep -v mock | head -5; then
            echo "::warning::Hardcoded password pattern detected"
          fi

          if [ "$found" -eq 1 ]; then
            echo ""
            echo "::error::Secrets detected! Remove credentials before pushing."
            exit 1
          fi

          echo "No credential leaks detected"
